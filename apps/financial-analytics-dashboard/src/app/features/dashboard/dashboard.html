<div class="py-6 px-4 md:px-10 w-full flex flex-col gap-6">
    <!-- first row-->
    <div class="flex gap-4 w-full overflow-x-auto flex-nowrap lg:flex-row lg:justify-between">
        @for (card of infoCard; track card.label) {
            <app-info-card [card]="card" class="min-w-[250px] flex-shrink-0"></app-info-card>
        }
    </div>

    <!-- second row-->
    <div class="flex flex-col w-full gap-6 md:flex-row">
        <!-- Weekly activity -->
        <app-weekly-activity class="w-full md:flex-[2] min-w-0"></app-weekly-activity>
        <!-- Expense Statitics -->
        <app-expense-statics class="w-full md:flex-1 min-w-0"></app-expense-statics>
    </div>

    <!-- third row-->
    <div class="flex flex-col w-full gap-6 md:flex-row">
        <!-- Recent Transaction -->
        <app-recent-transactions class="w-full md:flex-1 min-w-0"></app-recent-transactions>
        <!-- Balance History -->
        <app-balance-history class="w-full md:flex-[2] min-w-0"></app-balance-history>
    </div>
</div>
