<div class="py-8 px-10 w-full h-full flex flex-col justify-between items-center gap-6">
    <!-- first row-->
    <div class="flex gap-6 w-full overflow-x-auto flex-nowrap lg:flex-row lg:justify-between">
        @for (card of infoCard; track card.label) {
            <app-info-card [card]="card" class="min-w-[250px]"></app-info-card>
        }
    </div>

    <!-- second row-->
    <div class="flex flex-col items-center justify-between w-full gap-6 md:flex-row">
        <!-- Weekly activity -->
        <app-weekly-activity></app-weekly-activity>
        <!-- Expense Statitics -->
        <app-expense-statics></app-expense-statics>
    </div>

    <!-- third row-->
    <div class="flex flex-col items-center justify-between w-full gap-6 md:flex-row">
        <!-- Recent Transaction -->
        <app-recent-transactions></app-recent-transactions>
        <!-- Balance History -->
        <app-balance-history></app-balance-history>
    </div>
</div>
