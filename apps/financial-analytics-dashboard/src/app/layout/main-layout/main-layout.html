<div class="flex flex-col h-screen overflow-x-hidden">
  <header class="h-[6rem] bg-white border-b border-gray-200 p-8 flex items-center">
    <div class="flex items-center">
      <button class="lg:hidden" (click)="toggleSidebar()"><img src="assets/icons/hamburger.svg" alt="Toggle Sidebar"
          class="w-6 h-6" />
      </button>
      <div class="hidden lg:flex items-center gap-4 w-56 pl-8">
        <!-- Page Title -->
        <img src="assets/icons/bank.svg" class="w-6 h-6" alt="icon" />
        <h1 class="text-[2rem] font-black text-[#343C6A] font-mont">
          BANK
        </h1>
      </div>
    </div>
    <app-header [pageTitle]="pageTitle" class="w-full"></app-header>
  </header>

  <div class="flex flex-row flex-1 w-full overflow-hidden">
    <app-sidenav [ngClass]="{
                    'hidden -translate-x-full': !isSidebarOpen,
                    'flex translate-x-0': isSidebarOpen
                  }" 
                  class="fixed top-[6rem] left-0 h-[calc(100%-6rem)] z-50 bg-white w-[260px]
                         transition-transform duration-300 lg:translate-x-0 lg:static lg:flex" 
                  [navItems]="navItems"
                  (itemSelected)="onSidebarItemClick()">
    </app-sidenav>
    @if (isSidebarOpen) {
      <div class="fixed inset-0 bg-black/40 z-40 lg:hidden"
          (click)="toggleSidebar()"></div>
    }
    <div class="flex-1 bg-[#F5F7FA] overflow-hidden">
      <main class="h-full overflow-y-auto p-4">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
