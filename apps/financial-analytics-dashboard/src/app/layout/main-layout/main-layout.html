<div class="flex flex-col h-full overflow-x-hidden">
  <header class="h-[6rem] bg-white border-b border-gray-200 p-8 flex items-center">
    <div class="flex items-center">
      <button class="lg:hidden" (click)="toggleSidebar()"><img src="assets/icons/hamburger.svg" alt="Toggle Sidebar"
          class="w-6 h-6" />
      </button>
      <div class="hidden lg:flex items-center gap-4 w-56 pl-8">
        <!-- Page Title -->
        <img src="assets/icons/bank.svg" class="w-6 h-6" alt="icon" />
        <h1 class="text-[2rem] font-black text-[#343C6A] font-mont">
          BANK
        </h1>
      </div>
    </div>
    <app-header [pageTitle]="pageTitle" class="w-full"></app-header>
  </header>


  <div class="flex flex-row h-full w-full">
    <app-sidenav 
      [ngClass]="{
        'hidden': !isSidebarOpen,
        'flex': isSidebarOpen,
        'md:flex': true
      }"
      class="fixed md:static top-[6rem] left-0 h-[calc(100%-6rem)] z-50 bg-white" 
      [navItems]="navItems"
      (itemSelected)="onSidebarItemClick()"></app-sidenav>

    <div class="w-full bg-[#F5F7FA]">
      <main class="">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
